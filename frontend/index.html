<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>C Docker Runner</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="./script.js" defer></script>
</head>
<body class="bg-slate-100 min-h-screen text-slate-900">
  <header class="bg-gradient-to-r from-sky-600 to-indigo-700 text-white">
    <div class="max-w-6xl mx-auto px-4 py-5 flex items-center justify-between">
      <div>
        <h1 class="text-2xl font-bold">C Code Runner</h1>
        <p class="text-sm text-white/80">คอมไพล์และรันด้วย Docker บนเซิร์ฟเวอร์</p>
      </div>
      <button id="themeToggle" class="px-3 py-1.5 rounded-lg bg-white/20 hover:bg-white/30">Dark mode</button>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-4 py-6">
    <section class="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
      <div class="flex flex-wrap items-center justify-between gap-3 mb-4">
        <div class="flex items-center gap-2">
          <span class="text-sm text-slate-600">Language:</span>
          <span class="px-2.5 py-1 rounded-md bg-emerald-100 text-emerald-700 text-sm font-medium">C (gcc in Docker)</span>
        </div>
        <span id="statusBadge" class="px-2.5 py-1 rounded-md bg-slate-100 text-slate-600 text-sm">พร้อมใช้งาน</span>
      </div>

      <label for="editor" class="block text-sm font-medium mb-2">โค้ด C</label>
      <textarea id="editor" class="w-full h-72 p-4 rounded-lg border border-slate-300 font-mono text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400"></textarea>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-4">
        <div>
          <label for="stdin" class="block text-sm font-medium mb-2">stdin (อินพุต)</label>
          <textarea id="stdin" class="w-full h-28 p-3 rounded-lg border border-slate-300 font-mono text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" placeholder="เช่น: 1 2"></textarea>
        </div>
        <div>
          <label for="console" class="block text-sm font-medium mb-2">ผลลัพธ์</label>
          <pre id="console" class="h-28 p-3 rounded-lg bg-slate-950 text-green-300 text-sm overflow-auto"></pre>
        </div>
      </div>

      <div class="flex flex-wrap gap-2 mt-4">
        <button id="runBtn" class="px-4 py-2 rounded-lg bg-indigo-600 text-white hover:bg-indigo-700">Run</button>
        <button id="submitBtn" class="px-4 py-2 rounded-lg bg-emerald-600 text-white hover:bg-emerald-700">Submit</button>
        <button id="sampleBtn" class="px-4 py-2 rounded-lg bg-slate-200 hover:bg-slate-300">Sample code</button>
        <button id="clearBtn" class="px-4 py-2 rounded-lg bg-slate-200 hover:bg-slate-300">Clear</button>
      </div>
    </section>
  </main>
</body>
</html>
